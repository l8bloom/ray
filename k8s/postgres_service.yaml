apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  ports:
    - port: 7777
      targetPort: pg-port
  selector:
    app: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service-node-port
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 7777
      targetPort: pg-port
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-nodes
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      name: pg-port
